<!DOCTYPE html>
<html>
    <head>
        <title>flexbox practice</title>
    </head>
    <body style="padding-bottom: 1000px;">
        <div style="
            display: flex;
            flex-direction: row;
            ">
            <div style="background-color: lightblue;">div1 text</div>
            <div style="background-color: pink;">div2 <p>text</p></div>
        </div>

                <div style="
                    margin-top: 30px;
                    display: flex;
                    flex-direction: row;
                    ">
                    <div style="
                    width: 100px;
                    background-color: lightblue;
                    ">100px</div>
                    <div style="
                    flex: 1;
                    background-color: pink;">flex:1</div>
                    <div style="
                    flex: 2;
                    background-color: lightblue;
                    ">flex 2</div>
                </div>
                    <div style="
                        margin-top: 30px;
                        height: 70px;
                        border-width: 1px;
                        border-style: solid;
                        border-color: grey;
                        display: flex;
                        flex-direction: row;
                        justify-content: center;
                        ">
                        <div style="
                        width: 100px;
                        background-color: rgb(192, 225, 255);">100px</div>
                        <div style="
                        width: 100px;
                        background-color: pink;
                        ">100px</div>
                        <div style="
                        width: 100px;
                        background-color: lightblue;
                        ">100px</div>
                    </div>

                        <div style="
                            margin-top: 30px;
                            height: 70px;
                            border-width: 1px;
                            border-style: solid;
                            border-color: grey;
                            display: flex;
                            flex-direction: row;
                            justify-content: space-between;
                            ">
                            <div style="
                            width: 100px;
                            background-color: rgb(192, 225, 255);">100px</div>
                            <div style="
                            width: 100px;
                            background-color: pink;
                            ">100px</div>
                            <div style="
                            width: 100px;
                            background-color: lightblue;
                            ">100px</div>
                        </div>

                            <div style="
                                margin-top: 30px;
                                height: 70px;
                                border-width: 1px;
                                border-style: solid;
                                border-color: grey;
                                display: flex;
                                flex-direction: row;
                                justify-content: space-between;
                                align-items: center;
                                ">
                                <div style="
                                width: 100px;
                                background-color: rgb(192, 225, 255);">100px</div>
                                <div style="
                                width: 100px;
                                background-color: pink;
                                ">100px</div>
                                <div style="
                                width: 100px;
                                background-color: lightblue;
                                ">100px</div>
                            </div>
        
    </body>
</html>
