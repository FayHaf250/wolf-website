<!DOCTYPE html>
<html>
    <head>
        <title>grid practice</title>
    </head>
    <body style="padding-bottom: 100000px;">
        <div style="
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            ">
            <div style="background-color: lightblue;">div1</div>
            <div style="background-color: pink;">div2</div>
            <div style="background-color: lightblue;">100px</div>
        </div>
                    <div style="
                margin-top: 10px;
                display: grid;
                grid-template-columns: 100px 100px 200px 100px;
                justify-content: center;
                ">
                <div style="background-color: lightblue;">100px</div>
                <div style="background-color: pink;">200px <p>text</p></div>
                <div style="background-color: lightblue;">200px</div>
                <div style="background-color: pink;">100px </div>

        </div>
                            <div style="
                margin-top: 10px;
                display: grid;
                grid-template-columns: 2fr 1fr;
                ">
                <div style="background-color: lightblue;">2fr</div>
                <div style="background-color: pink;">1fr </div>


        </div>
        <div style="
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            margin-top: 20px;
            column-gap: 20px;
            row-gap: 40px;
            justify-content: center;
            
            ">
            <div style="background-color: lightblue; height: 200px;">1fr</div>
            <div style="background-color: pink; height: 200px; ">1fr</div>
            <div style="background-color: lightblue; height: 200px; ">1fr</div>
            <div style="background-color: pink; height: 200px; ">1fr</div>
            <div style="background-color: lightblue; height: 200px; ">1fr</div>
            <div style="background-color: pink; height: 200px; ">1fr</div>
        </div>
    </body>
</html>
