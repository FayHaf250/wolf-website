<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position practice</title>
</head>
<body style="
height: 3000px;
padding-top: 60px;
padding-left: 80px;
">
    <div style="
        background-color:#000000;
        color: #fff;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 50px;
        ">header</div>

        <div style="
        background-color: green;
        color: white;
        position: fixed;
        left: 0;
        bottom: 0;
        top: 50px;
        width: 72px;
        ">
            sidebar
        </div>

        <div style="
          position: absolute;
          background-color: red;
          color: white;
          right: 10px;
          


        ">
            absolute
        </div>

    <div style="
    background-color: lightblue;
    height: 200px;
    width: 200px;
    position: static;
        ">div1</div>
    <div style="
    background-color: pink;
    height: 200px;
    width: 200px;
    position: relative;
    ">
    div2

    <div style="
          position: absolute;
          background-color: rgb(0, 0, 0);
          color: white;
          right: 10px;
          bottom: 10px;
          
          ">
            5:22
        </div>

</div>
</body>
</html>
